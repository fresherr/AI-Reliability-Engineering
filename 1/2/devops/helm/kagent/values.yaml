providers:
  default: openAI
  openAI:
    provider: OpenAI
    model: gemini-2.5-flash
    apiKeySecretRef: kagent-agentgateway
    apiKeySecretKey: OPENAI_API_KEY
    openAI:
      baseUrl: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/v1beta/openai

agents:
  argo-rollouts-agent:
    enabled: false
  cilium-debug-agent:
    enabled: false
  cilium-manager-agent:
    enabled: false
  cilium-policy-agent:
    enabled: false
  helm-agent:
    enabled: true
  istio-agent:
    enabled: false
  k8s-agent:
    enabled: true
  kgateway-agent:
    enabled: false
  observability-agent:
    enabled: false
  promql-agent:
    enabled: false

tools:
  grafana-mcp:
    enabled: false
  querydoc:
    enabled: false

kmcp:
  enabled: false
