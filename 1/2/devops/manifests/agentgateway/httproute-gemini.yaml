apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gemini-openai-compatible
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1beta/openai
      backendRefs:
        - name: gemini
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
