apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  interval: 1m
  releaseName: agentregistry
  chart:
    spec:
      chart: charts/agentregistry
      sourceRef:
        kind: GitRepository
        name: abox-repo
        namespace: flux-system
  install:
    createNamespace: true
  values:
    disableAuth: true
    replicaCount: 1
    controller:
      leaderElection: false
    httpApi:
      serviceType: ClusterIP

---
# Expose via agentgateway using Gateway API
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: agentregistry
  to:
  - group: ""
    kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  parentRefs:
  - name: agentgateway-external
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /agentregistry
    backendRefs:
    - name: agentregistry-api
      namespace: agentregistry
      port: 8080
  - matches:
    - path:
        type: PathPrefix
        value: /agentregistry/mcp
    backendRefs:
    - name: agentregistry-api
      namespace: agentregistry
      port: 8083
